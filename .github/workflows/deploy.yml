name: AutoCloud Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 13.234.35.177
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/devops-autocloud
          git pull origin main
          docker build -t autocloud-app .
          docker stop app || true
          docker rm app || true
          docker run -d -p 80:3000 --name app autocloud-app